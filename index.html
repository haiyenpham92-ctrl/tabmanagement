<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baking Cost Manager (Pro)</title>
    
    <!-- Tích hợp Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tích hợp React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Tích hợp Babel để biên dịch JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Cấu hình Babel sử dụng runtime 'classic' để tương thích với thẻ script UMD -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f3f4f6; }
        #root { height: 100%; }
        /* Tối ưu hiển thị khu vực an toàn trên Mobile (Tai thỏ / Vuốt đáy) */
        .pt-safe-top { padding-top: env(safe-area-inset-top); }
        .pb-safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react-classic">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- HỆ THỐNG ICON (Tự định nghĩa để đảm bảo file chạy ổn định 100% không lo lỗi CDN) ---
        const IconWrapper = ({ children, size=24, className="", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Package = (p) => <IconWrapper {...p}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></IconWrapper>;
        const Calculator = (p) => <IconWrapper {...p}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconWrapper>;
        const Plus = (p) => <IconWrapper {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconWrapper>;
        const Trash2 = (p) => <IconWrapper {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
        const Database = (p) => <IconWrapper {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconWrapper>;
        const Search = (p) => <IconWrapper {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
        const X = (p) => <IconWrapper {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
        const RefreshCw = (p) => <IconWrapper {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
        const CheckCircle2 = (p) => <IconWrapper {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const Edit2 = (p) => <IconWrapper {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
        const Filter = (p) => <IconWrapper {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconWrapper>;
        const CalendarDays = (p) => <IconWrapper {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></IconWrapper>;
        const ChevronLeft = (p) => <IconWrapper {...p}><polyline points="15 18 9 12 15 6"/></IconWrapper>;
        const Save = (p) => <IconWrapper {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconWrapper>;
        const AlertCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
        const ClipboardList = (p) => <IconWrapper {...p}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></IconWrapper>;
        const ShoppingBag = (p) => <IconWrapper {...p}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></IconWrapper>;

        // --- UTILITIES & LOGIC ---
        const formatCurrency = (amount) => {
            if (isNaN(amount)) return '0 ₫';
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(amount);
        };

        const formatSmartQty = (qty, unit) => {
            if (!qty) return `0 ${unit}`;
            if (unit === 'g' && qty >= 1000) return `${(qty / 1000).toLocaleString('vi-VN', {maximumFractionDigits: 2})} kg`;
            if (unit === 'ml' && qty >= 1000) return `${(qty / 1000).toLocaleString('vi-VN', {maximumFractionDigits: 2})} l`;
            return `${qty.toLocaleString('vi-VN', {maximumFractionDigits: 2})} ${unit}`;
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        const generateSKU = (category, name) => {
            const removeAccents = (str) => str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D');
            const catCode = removeAccents(category).substring(0, 3).toUpperCase();
            const nameCode = removeAccents(name).split(' ').map(w => w[0]).join('').substring(0, 3).toUpperCase();
            const randomNum = Math.floor(100 + Math.random() * 900);
            return `${catCode}-${nameCode}-${randomNum}`;
        };

        const UNIT_SYSTEM = {
            'kg': { family: 'mass', ratio: 1000 },
            'g': { family: 'mass', ratio: 1 },
            'l': { family: 'volume', ratio: 1000 },
            'ml': { family: 'volume', ratio: 1 },
            'cái': { family: 'piece', ratio: 1 },
            'hộp': { family: 'box', ratio: 1 },
            'gói': { family: 'pack', ratio: 1 },
        };
        const UNITS = Object.keys(UNIT_SYSTEM);

        const getCompatibleUnits = (baseUnit) => {
            const family = UNIT_SYSTEM[baseUnit]?.family;
            if (!family || ['piece', 'box', 'pack'].includes(family)) return [baseUnit];
            return Object.keys(UNIT_SYSTEM).filter(u => UNIT_SYSTEM[u].family === family);
        };

        const normalizeToMaster = (value, fromUnit, masterUnit) => {
            if (fromUnit === masterUnit) return parseFloat(value);
            const fromRatio = UNIT_SYSTEM[fromUnit]?.ratio || 1;
            const masterRatio = UNIT_SYSTEM[masterUnit]?.ratio || 1;
            return parseFloat(value) * (fromRatio / masterRatio);
        };

        const DEFAULT_SYNC_URL = 'https://script.google.com/macros/s/AKfycbzZJuqxr4DLzlaz29n2hJo-KsqJVu8wHSzCs8n_Y6n6aDOwnPN0oLRzHwghHTyysQkyOw/exec';

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('master');
            
            const [masterIngredients, setMasterIngredients] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [planItems, setPlanItems] = useState([]);
            
            const [syncStatus, setSyncStatus] = useState('');
            const [syncUrl, setSyncUrl] = useState(DEFAULT_SYNC_URL);
            const [showSyncConfig, setShowSyncConfig] = useState(false);

            const masterRef = useRef(masterIngredients);
            const invRef = useRef(inventory);
            const recipesRef = useRef(recipes);
            const syncTimeoutRef = useRef(null);
            const [isHydrated, setIsHydrated] = useState(false);

            useEffect(() => { masterRef.current = masterIngredients; }, [masterIngredients]);
            useEffect(() => { invRef.current = inventory; }, [inventory]);
            useEffect(() => { recipesRef.current = recipes; }, [recipes]);

            useEffect(() => {
                const savedMaster = localStorage.getItem('baking_master');
                const savedInventory = localStorage.getItem('baking_inventory');
                const savedRecipes = localStorage.getItem('baking_recipes');
                const savedPlan = localStorage.getItem('baking_plan');
                const savedUrl = localStorage.getItem('baking_sync_url');
                
                if (savedMaster) setMasterIngredients(JSON.parse(savedMaster));
                if (savedInventory) setInventory(JSON.parse(savedInventory));
                if (savedRecipes) setRecipes(JSON.parse(savedRecipes));
                if (savedPlan) setPlanItems(JSON.parse(savedPlan));
                if (savedUrl) setSyncUrl(savedUrl);
                
                setIsHydrated(true);
            }, []);

            useEffect(() => { if (isHydrated && syncUrl) handleSync(true); }, [isHydrated]);

            useEffect(() => {
                localStorage.setItem('baking_master', JSON.stringify(masterIngredients));
                localStorage.setItem('baking_inventory', JSON.stringify(inventory));
                localStorage.setItem('baking_recipes', JSON.stringify(recipes));
                localStorage.setItem('baking_plan', JSON.stringify(planItems));
                localStorage.setItem('baking_sync_url', syncUrl);
            }, [masterIngredients, inventory, recipes, planItems, syncUrl]);

            const scheduleSync = () => {
                if (syncTimeoutRef.current) clearTimeout(syncTimeoutRef.current);
                setSyncStatus('Chờ lưu ngầm...');
                syncTimeoutRef.current = setTimeout(() => { handleSync(true); }, 3000);
            };

            const handleSaveMaster = (item) => {
                if (item.id) setMasterIngredients(masterIngredients.map(i => i.id === item.id ? { ...i, ...item, updatedAt: Date.now() } : i));
                else setMasterIngredients([{ ...item, id: generateId(), updatedAt: Date.now() }, ...masterIngredients]);
                scheduleSync();
            };

            const handleDeleteMaster = (id) => {
                setMasterIngredients(masterIngredients.map(i => i.id === id ? { ...i, isDeleted: true, updatedAt: Date.now() } : i));
                scheduleSync();
            };

            const handleSaveInventory = (item) => {
                if (item.id) setInventory(inventory.map(i => i.id === item.id ? { ...i, ...item, updatedAt: Date.now() } : i));
                else setInventory([{ ...item, id: generateId(), updatedAt: Date.now() }, ...inventory]);
                scheduleSync();
            };

            const handleDeleteInventory = (id) => {
                setInventory(inventory.map(i => i.id === id ? { ...i, isDeleted: true, updatedAt: Date.now() } : i));
                scheduleSync();
            };

            const handleSaveRecipe = (item) => {
                if (item.id) setRecipes(recipes.map(r => r.id === item.id ? { ...r, ...item, updatedAt: Date.now() } : r));
                else setRecipes([{ ...item, id: generateId(), updatedAt: Date.now() }, ...recipes]);
                scheduleSync();
            };

            const handleDeleteRecipe = (id) => {
                setRecipes(recipes.map(r => r.id === id ? { ...r, isDeleted: true, updatedAt: Date.now() } : r));
                setPlanItems(planItems.filter(p => p.recipeId !== id));
                scheduleSync();
            };

            const handleSync = async (isBackground = false) => {
                if (!syncUrl) {
                    if (!isBackground) setShowSyncConfig(true);
                    return;
                }

                let urlObj;
                try { urlObj = new URL(syncUrl); } catch (e) {
                    if (!isBackground) setSyncStatus('Lỗi: Link không hợp lệ!');
                    setTimeout(() => setSyncStatus(''), 3000);
                    return;
                }

                setSyncStatus(isBackground ? 'Đang đồng bộ ngầm...' : 'Đang kết nối với Sheet...');
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                try {
                    urlObj.searchParams.set('t', Date.now());
                    const response = await fetch(urlObj.toString(), { method: 'GET', signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    const textResponse = await response.text();
                    let serverData;
                    try { serverData = JSON.parse(textResponse); } 
                    catch (err) { throw new Error("Dữ liệu lỗi. Vui lòng kiểm tra quyền truy cập Sheet."); }
                    if (serverData.error) throw new Error(serverData.error);

                    const sanitizeMaster = (arr) => (arr || []).map(item => ({
                        ...item, id: item.id || generateId(),
                        sku: item.sku || generateSKU(item.category || 'UNK', item.name || 'UNK'),
                        updatedAt: item.updatedAt ? Number(item.updatedAt) : 0,
                        isDeleted: item.isDeleted === true || String(item.isDeleted).toLowerCase() === 'true'
                    }));
                    const sanitizeGeneric = (arr) => (arr || []).map(item => ({
                        ...item, id: item.id || generateId(),
                        updatedAt: item.updatedAt ? Number(item.updatedAt) : (item.date ? Number(item.date) : 0),
                        isDeleted: item.isDeleted === true || String(item.isDeleted).toLowerCase() === 'true'
                    }));

                    serverData.master = sanitizeMaster(serverData.master);
                    serverData.inventory = sanitizeGeneric(serverData.inventory);
                    serverData.recipes = sanitizeGeneric(serverData.recipes);

                    const latestMaster = masterRef.current;
                    const latestInv = invRef.current;
                    const latestRecipes = recipesRef.current;

                    const mergeData = (local, server) => {
                        const map = new Map();
                        const getSafeTime = (item) => {
                            let t = item.updatedAt || item.date || 0;
                            return (isNaN(Number(t)) || Number(t) > 10000000000000) ? 0 : Number(t);
                        };

                        [...(server || [])].forEach(item => map.set(item.id, item));
                        [...(local || [])].forEach(item => {
                            if (!map.has(item.id)) map.set(item.id, item);
                            else if (getSafeTime(item) > getSafeTime(map.get(item.id))) map.set(item.id, item);
                        });
                        return Array.from(map.values());
                    };

                    const mergedMaster = mergeData(latestMaster, serverData.master);
                    const mergedInventory = mergeData(latestInv, serverData.inventory);
                    const mergedRecipes = mergeData(latestRecipes, serverData.recipes);

                    const enrichedInventory = mergedInventory.map(inv => {
                        const master = mergedMaster.find(m => m.id === inv.masterId);
                        return master ? { ...inv, name: master.name, unit: master.unit } : inv;
                    });

                    setSyncStatus(isBackground ? 'Đang lưu vào Sheet...' : 'Đang đồng bộ dữ liệu...');
                    const postController = new AbortController();
                    const postTimeoutId = setTimeout(() => postController.abort(), 15000);

                    const postResponse = await fetch(syncUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ master: mergedMaster, inventory: enrichedInventory, recipes: mergedRecipes }),
                        signal: postController.signal
                    });
                    clearTimeout(postTimeoutId);
                    
                    try {
                        const postText = await postResponse.text();
                        const postJson = JSON.parse(postText);
                        if (postJson.status === 'error') {
                            throw new Error(postJson.message || "Lỗi ghi dữ liệu Sheet");
                        }
                    } catch(e) {
                        if (e.message && e.message !== 'Unexpected end of JSON input') {
                            throw e;
                        }
                    }

                    setMasterIngredients(mergedMaster);
                    setInventory(mergedInventory);
                    setRecipes(mergedRecipes);
                    setSyncStatus('Đồng bộ thành công!');
                    
                } catch (error) {
                    if (error.name === 'AbortError') setSyncStatus('Lỗi: Mạng chậm/mất kết nối!');
                    else if (error.message.includes('Failed to fetch')) setSyncStatus('Lỗi CORS: Kiểm tra quyền Anyone!');
                    else setSyncStatus('Lỗi: ' + error.message);
                }
                setTimeout(() => setSyncStatus(''), 4000);
            };

            return (
                <div className="bg-gray-100 min-h-screen flex justify-center font-sans text-gray-900">
                    <div className="w-full max-w-md bg-white h-[100dvh] flex flex-col shadow-2xl relative overflow-hidden">
                        
                        <header className="bg-orange-500 pt-safe-top z-20 shadow-sm relative">
                            <div className="px-5 py-4 flex flex-col items-center justify-center">
                                <h1 className="text-xl font-bold text-white tracking-wide">
                                    {activeTab === 'master' ? 'Danh Mục Gốc' : activeTab === 'inventory' ? 'Nhập Kho' : 'Tính Nguyên Liệu'}
                                </h1>
                            </div>
                            
                            {activeTab === 'master' && (
                               <button onClick={() => handleSync(false)} className="absolute top-4 right-4 text-white/90 hover:text-white p-1 rounded-full active:rotate-180 transition-all duration-500">
                                   <RefreshCw size={20} />
                               </button>
                            )}

                            {showSyncConfig && (
                                <div className="absolute top-full left-0 w-full bg-white p-4 shadow-xl border-b border-gray-200 z-50 animate-in slide-in-from-top-2">
                                    <div className="flex justify-between items-center mb-3">
                                        <label className="text-sm font-bold text-gray-700">Link Google App Script</label>
                                        <button onClick={() => setShowSyncConfig(false)} className="text-gray-400 hover:text-gray-600 active:scale-90"><X size={20} /></button>
                                    </div>
                                    <input type="text" placeholder="Dán link Web App vào đây..." value={syncUrl} onChange={(e) => setSyncUrl(e.target.value)} className="w-full h-12 px-3 bg-gray-50 border border-gray-300 rounded-xl text-sm mb-3 focus:ring-2 focus:ring-orange-500 outline-none" />
                                    <button onClick={() => { setShowSyncConfig(false); if(syncUrl) handleSync(); }} className="w-full h-12 bg-gray-900 text-white font-bold rounded-xl active:scale-95 transition-transform">
                                        Lưu & Bắt đầu đồng bộ
                                    </button>
                                </div>
                            )}

                            {syncStatus && (
                                <div className="absolute -bottom-10 left-0 w-full bg-green-600 text-white text-xs font-medium py-1.5 px-4 text-center flex items-center justify-center space-x-1 animate-in slide-in-from-top fade-in">
                                    <CheckCircle2 size={14} /><span>{syncStatus}</span>
                                </div>
                            )}
                        </header>

                        <main className="flex-1 overflow-y-auto bg-gray-50 pb-20 relative">
                            {activeTab === 'master' && (
                                <MasterDataView items={masterIngredients.filter(i => !i.isDeleted)} onSave={handleSaveMaster} onDelete={handleDeleteMaster} />
                            )}
                            {activeTab === 'inventory' && (
                                <InventoryView inventory={inventory.filter(i => !i.isDeleted)} masterItems={masterIngredients.filter(i => !i.isDeleted)} onSave={handleSaveInventory} onDelete={handleDeleteInventory} />
                            )}
                            {activeTab === 'planner' && (
                                <PlannerView 
                                    recipes={recipes.filter(r => !r.isDeleted)} 
                                    inventory={inventory.filter(i => !i.isDeleted)} 
                                    masterItems={masterIngredients.filter(i => !i.isDeleted)} 
                                    onSaveRecipe={handleSaveRecipe} 
                                    onDeleteRecipe={handleDeleteRecipe}
                                    planItems={planItems}
                                    setPlanItems={setPlanItems}
                                />
                            )}
                        </main>

                        <nav className="absolute bottom-0 w-full bg-white border-t border-gray-200 pb-safe-bottom z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                            <div className="flex h-[68px]">
                                <NavButton id="master" active={activeTab} icon={Database} label="Danh mục" onClick={setActiveTab} />
                                <NavButton id="inventory" active={activeTab} icon={Package} label="Nhập kho" onClick={setActiveTab} />
                                <NavButton id="planner" active={activeTab} icon={ClipboardList} label="Kế hoạch" onClick={setActiveTab} />
                            </div>
                        </nav>
                    </div>
                </div>
            );
        }

        function NavButton({ id, active, icon: Icon, label, onClick }) {
            return (
                <button onClick={() => onClick(id)} className={`flex-1 flex flex-col items-center justify-center space-y-1 transition-colors active:bg-orange-50 ${active === id ? 'text-orange-600' : 'text-gray-400'}`}>
                    <Icon size={24} strokeWidth={active === id ? 2.5 : 2} className={active === id ? 'scale-110 duration-200' : ''} />
                    <span className="text-[11px] font-semibold">{label}</span>
                </button>
            );
        }

        // ==========================================
        // VIEW 1: MASTER DATA 
        // ==========================================
        function MasterDataView({ items, onSave, onDelete }) {
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ category: '', name: '', brand: '', store: '', unit: 'kg', sku: '', skuManualOverride: false });
            const [skuError, setSkuError] = useState('');

            useEffect(() => {
                if (!editingId && !formData.skuManualOverride && formData.category && formData.name) {
                    setFormData(prev => ({ ...prev, sku: generateSKU(prev.category, prev.name) }));
                }
            }, [formData.category, formData.name, editingId, formData.skuManualOverride]);

            const handleEdit = (item) => {
                setEditingId(item.id);
                setFormData({ category: item.category, name: item.name, brand: item.brand || '', store: item.store || '', unit: item.unit, sku: item.sku, skuManualOverride: true });
                setSkuError('');
                setShowForm(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const finalSku = formData.sku || generateSKU(formData.category, formData.name);

                const isDuplicate = items.some(i => i.sku.toLowerCase() === finalSku.toLowerCase() && i.id !== editingId);
                if (isDuplicate) {
                    setSkuError('SKU này đã tồn tại! Vui lòng nhập mã khác.');
                    return;
                }

                onSave({ ...formData, sku: finalSku.toUpperCase(), id: editingId });
                setShowForm(false); setEditingId(null); 
                setFormData({ category: '', name: '', brand: '', store: '', unit: 'kg', sku: '', skuManualOverride: false });
                setSkuError('');
            };

            return (
                <div className="flex flex-col">
                    <div className="p-4 bg-white shadow-sm sticky top-0 z-10">
                        {!showForm ? (
                            <button onClick={() => setShowForm(true)} className="w-full h-14 bg-orange-100 text-orange-700 font-bold rounded-xl flex items-center justify-center space-x-2 active:scale-95 transition-all">
                                <Plus size={22} /><span>Thêm nguyên liệu gốc</span>
                            </button>
                        ) : (
                            <form onSubmit={handleSubmit} className="bg-white border border-gray-200 rounded-2xl p-4 space-y-4 shadow-lg">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-gray-800">{editingId ? 'Sửa nguyên liệu' : 'Thêm mới'}</h3>
                                    <button type="button" onClick={() => {setShowForm(false); setEditingId(null); setFormData({ category: '', name: '', brand: '', store: '', unit: 'kg', sku: '', skuManualOverride: false }); setSkuError('');}} className="p-1 rounded-full bg-gray-100 text-gray-500"><X size={18}/></button>
                                </div>
                                
                                <div className="flex space-x-3">
                                    <div className="flex-1">
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Loại</label>
                                        <input required placeholder="VD: Bột..." value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full h-12 px-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
                                    </div>
                                    <div className="flex-[2]">
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Tên nguyên liệu</label>
                                        <input required placeholder="VD: Mì đa dụng..." value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full h-12 px-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Mã SKU</label>
                                    <input 
                                        placeholder="VD: BOT-MDA-123" 
                                        value={formData.sku} 
                                        onChange={e => {
                                            setFormData({...formData, sku: e.target.value.toUpperCase(), skuManualOverride: true});
                                            setSkuError('');
                                        }} 
                                        className={`w-full h-12 px-3 bg-gray-50 border ${skuError ? 'border-red-500 focus:ring-red-500' : 'border-gray-200 focus:ring-orange-500'} rounded-xl focus:ring-2 outline-none uppercase font-mono font-bold tracking-wider text-gray-700`} 
                                    />
                                    {skuError && <p className="text-xs text-red-500 mt-1 font-medium flex items-center"><AlertCircle size={12} className="mr-1"/>{skuError}</p>}
                                </div>

                                <div className="flex space-x-3">
                                    <div className="flex-1">
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Hãng</label>
                                        <input placeholder="VD: Meizan" value={formData.brand} onChange={e => setFormData({...formData, brand: e.target.value})} className="w-full h-12 px-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500" />
                                    </div>
                                    <div className="w-24">
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Đ.Vị</label>
                                        <select value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} className="w-full h-12 px-3 bg-gray-50 border rounded-xl appearance-none font-medium outline-none focus:ring-2 focus:ring-orange-500">
                                            {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nơi mua</label>
                                    <input placeholder="VD: Shopee, Metro..." value={formData.store} onChange={e => setFormData({...formData, store: e.target.value})} className="w-full h-12 px-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500" />
                                </div>

                                <button type="submit" className="w-full h-12 bg-gray-900 text-white font-bold rounded-xl active:scale-95">{editingId ? 'Cập nhật' : 'Lưu danh mục'}</button>
                            </form>
                        )}
                    </div>

                    <div className="p-4 space-y-3">
                        {items.length === 0 && <p className="text-center text-gray-400 mt-10">Chưa có danh mục nào.</p>}
                        {items.map(item => (
                            <div key={item.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50 transition-colors relative overflow-hidden flex justify-between items-center">
                                <div className="absolute top-0 left-0 w-1 h-full bg-orange-400"></div>
                                <div className="pl-2 flex-1">
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">{item.category}</p>
                                    <h3 className="font-bold text-gray-800 text-lg leading-tight">{item.name}</h3>
                                    <div className="text-xs text-gray-500 mt-1 flex flex-wrap gap-1.5 items-center">
                                        <span className="font-mono bg-gray-100 px-1.5 py-0.5 rounded text-gray-700">{item.sku}</span>
                                        <span className="bg-orange-100 text-orange-800 font-bold px-1.5 py-0.5 rounded">{item.unit}</span>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center space-y-1">
                                    <button onClick={() => handleEdit(item)} className="w-8 h-8 flex items-center justify-center rounded-full text-blue-400 bg-blue-50 active:scale-90"><Edit2 size={14} /></button>
                                    <button onClick={() => onDelete(item.id)} className="w-8 h-8 flex items-center justify-center rounded-full text-red-400 bg-red-50 active:scale-90"><Trash2 size={14} /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // VIEW 2: INVENTORY 
        // ==========================================
        function InventoryView({ inventory, masterItems, onSave, onDelete }) {
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [showFilters, setShowFilters] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedMaster, setSelectedMaster] = useState(null);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            
            const [quantity, setQuantity] = useState('');
            const [inputUnit, setInputUnit] = useState('');
            const [price, setPrice] = useState('');
            const [formDate, setFormDate] = useState(new Date().toISOString().split('T')[0]);
            const [store, setStore] = useState('');
            const [filters, setFilters] = useState({ startDate: '', endDate: '', category: '', search: '' });

            const uniqueCategories = useMemo(() => [...new Set(masterItems.map(item => item.category))], [masterItems]);

            const filteredMasterForDropdown = useMemo(() => {
                if (!searchQuery) return masterItems;
                const lowerQ = searchQuery.toLowerCase();
                return masterItems.filter(item => item.name.toLowerCase().includes(lowerQ) || item.sku.toLowerCase().includes(lowerQ));
            }, [searchQuery, masterItems]);

            const handleEdit = (inv) => {
                setEditingId(inv.id);
                const master = masterItems.find(m => m.id === inv.masterId);
                setSelectedMaster(master || null);
                setSearchQuery(master ? master.name : '');
                setQuantity(inv.inputQty !== undefined ? inv.inputQty : inv.quantity);
                setInputUnit(inv.inputUnit || (master ? master.unit : ''));
                setPrice(inv.price);
                const d = new Date(inv.date);
                setFormDate(d.toISOString().split('T')[0]);
                setStore(inv.store || '');
                setShowForm(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!selectedMaster || !quantity || !price || !formDate) return;
                
                const timestamp = new Date(formDate).getTime();
                const normalizedQty = normalizeToMaster(quantity, inputUnit, selectedMaster.unit);

                onSave({ 
                    id: editingId, 
                    masterId: selectedMaster.id, 
                    sku: selectedMaster.sku, 
                    name: selectedMaster.name,
                    unit: selectedMaster.unit,
                    quantity: normalizedQty, 
                    inputQty: parseFloat(quantity),
                    inputUnit: inputUnit,
                    price: parseFloat(price), 
                    date: timestamp,
                    store: store.trim()
                });
                
                setShowForm(false); setEditingId(null); setSelectedMaster(null); setSearchQuery(''); 
                setQuantity(''); setInputUnit(''); setPrice(''); setStore(''); setFormDate(new Date().toISOString().split('T')[0]);
            };

            const filteredInventory = useMemo(() => {
                return inventory.filter(inv => {
                    const master = masterItems.find(m => m.id === inv.masterId);
                    if (!master) return false;
                    if (filters.search && !master.name.toLowerCase().includes(filters.search.toLowerCase()) && !master.sku.toLowerCase().includes(filters.search.toLowerCase())) return false;
                    if (filters.category && master.category !== filters.category) return false;
                    const invDateObj = new Date(inv.date);
                    invDateObj.setHours(0,0,0,0);
                    if (filters.startDate && invDateObj < new Date(filters.startDate)) return false;
                    if (filters.endDate && invDateObj > new Date(filters.endDate)) return false;
                    return true;
                }).sort((a, b) => b.date - a.date);
            }, [inventory, masterItems, filters]);

            const totalSpent = filteredInventory.reduce((sum, inv) => sum + inv.price, 0);

            return (
                <div className="flex flex-col">
                    <div className="p-4 bg-white shadow-sm z-20 sticky top-0 space-y-3">
                        {!showForm ? (
                             <button onClick={() => setShowForm(true)} className="w-full h-14 bg-orange-100 text-orange-700 font-bold rounded-xl flex items-center justify-center space-x-2 active:scale-95 transition-all">
                                 <Plus size={22} /><span>Nhập kho mới</span>
                             </button>
                        ) : (
                            <form onSubmit={handleSubmit} className="bg-white border border-gray-200 rounded-2xl p-4 space-y-4 shadow-lg relative">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-gray-800">{editingId ? 'Sửa phiếu nhập' : 'Tạo phiếu nhập'}</h3>
                                    <button type="button" onClick={() => {setShowForm(false); setEditingId(null);}} className="p-1 rounded-full bg-gray-100 text-gray-500"><X size={18}/></button>
                                </div>
                                
                                <div className="relative">
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nguyên liệu từ Danh mục</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><Search size={18} /></div>
                                        <input type="text" placeholder="Gõ tên hoặc SKU..." value={searchQuery} onChange={(e) => {setSearchQuery(e.target.value); setIsDropdownOpen(true); setSelectedMaster(null);}} onFocus={() => setIsDropdownOpen(true)} className="w-full h-12 pl-10 pr-10 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-medium text-gray-800" />
                                        {searchQuery && <button type="button" onClick={() => {setSearchQuery(''); setSelectedMaster(null); setIsDropdownOpen(true);}} className="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 active:scale-90"><X size={20} className="bg-gray-200 rounded-full p-0.5" /></button>}
                                    </div>
                                    {isDropdownOpen && filteredMasterForDropdown.length > 0 && (
                                        <ul className="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-2xl max-h-48 overflow-y-auto">
                                            {filteredMasterForDropdown.map(item => (
                                                <li key={item.id} onClick={() => {setSelectedMaster(item); setSearchQuery(item.name); setIsDropdownOpen(false); setInputUnit(item.unit); }} className="px-4 py-3 border-b border-gray-50 last:border-0 active:bg-orange-50 flex justify-between items-center cursor-pointer">
                                                    <div><div className="font-medium text-gray-800">{item.name}</div><div className="text-xs text-gray-400 font-mono mt-0.5">{item.sku}</div></div>
                                                    <span className="text-xs font-bold bg-gray-100 px-2 py-1 rounded">{item.unit}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    )}
                                </div>

                                {selectedMaster && (
                                    <>
                                        <div className="flex space-x-3">
                                            <div className="flex-[1.5] relative">
                                                <label className="block text-xs font-bold text-gray-500 uppercase mb-1">S.Lượng</label>
                                                <div className="relative flex items-center">
                                                    <input type="number" step="any" required value={quantity} onChange={e => setQuantity(e.target.value)} className={`w-full h-12 pl-3 ${getCompatibleUnits(selectedMaster.unit).length > 1 ? 'pr-16' : 'pr-12'} bg-gray-50 border rounded-xl text-lg font-bold outline-none focus:ring-2 focus:ring-orange-500`} />
                                                    {getCompatibleUnits(selectedMaster.unit).length > 1 ? (
                                                        <div className="absolute right-0 top-0 bottom-0 flex items-center bg-gray-100 border-l border-gray-200 rounded-r-xl">
                                                            <select value={inputUnit} onChange={e => setInputUnit(e.target.value)} className="h-full bg-transparent text-gray-600 font-bold pl-2 pr-1 focus:outline-none text-sm cursor-pointer">
                                                                {getCompatibleUnits(selectedMaster.unit).map(u => <option key={u} value={u}>{u}</option>)}
                                                            </select>
                                                        </div>
                                                    ) : (
                                                        <div className="absolute right-3 top-0 bottom-0 flex items-center text-gray-400 font-medium">{selectedMaster.unit}</div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="flex-[2]">
                                                <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Tổng tiền (VNĐ)</label>
                                                <input type="number" required value={price} onChange={e => setPrice(e.target.value)} className="w-full h-12 px-3 bg-gray-50 border rounded-xl text-lg font-bold text-orange-600 outline-none focus:ring-2 focus:ring-orange-500" />
                                            </div>
                                        </div>
                                        <div className="flex space-x-3">
                                            <div className="flex-[1]">
                                                <label className="block text-xs font-bold text-gray-500 uppercase mb-1 flex items-center gap-1"><CalendarDays size={14}/> Ngày nhập</label>
                                                <input type="date" required value={formDate} onChange={e => setFormDate(e.target.value)} className="w-full h-12 px-3 bg-gray-50 border rounded-xl font-medium text-gray-700 outline-none focus:ring-2 focus:ring-orange-500" />
                                            </div>
                                            <div className="flex-[1.5]">
                                                <label className="block text-xs font-bold text-gray-500 uppercase mb-1 flex items-center gap-1">Nơi nhập (Tùy chọn)</label>
                                                <input type="text" placeholder="VD: Siêu thị..." value={store} onChange={e => setStore(e.target.value)} className="w-full h-12 px-3 bg-gray-50 border rounded-xl font-medium text-gray-700 outline-none focus:ring-2 focus:ring-orange-500" />
                                            </div>
                                        </div>
                                    </>
                                )}
                                <button type="submit" disabled={!selectedMaster} className="w-full h-12 bg-gray-900 text-white font-bold rounded-xl disabled:bg-gray-300 active:scale-95">{editingId ? 'Lưu chỉnh sửa' : 'Nhập kho'}</button>
                            </form>
                        )}

                        {!showForm && (
                            <button onClick={() => setShowFilters(!showFilters)} className="w-full py-2 flex items-center justify-center space-x-2 text-sm font-bold text-gray-500 bg-gray-100 rounded-lg active:bg-gray-200">
                                <Filter size={16} /><span>{showFilters ? 'Ẩn bộ lọc' : 'Hiện bộ lọc thống kê'}</span>
                            </button>
                        )}

                        {showFilters && !showForm && (
                            <div className="bg-white border border-gray-200 rounded-xl p-3 shadow-sm space-y-3">
                                <div className="flex space-x-2">
                                    <div className="flex-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Từ ngày</label><input type="date" value={filters.startDate} onChange={e => setFilters({...filters, startDate: e.target.value})} className="w-full h-10 px-2 text-sm bg-gray-50 border rounded-lg outline-none focus:ring-2 focus:ring-orange-500" /></div>
                                    <div className="flex-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Đến ngày</label><input type="date" value={filters.endDate} onChange={e => setFilters({...filters, endDate: e.target.value})} className="w-full h-10 px-2 text-sm bg-gray-50 border rounded-lg outline-none focus:ring-2 focus:ring-orange-500" /></div>
                                </div>
                                <div className="flex space-x-2">
                                   <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="flex-1 h-10 px-2 text-sm bg-gray-50 border rounded-lg outline-none focus:ring-2 focus:ring-orange-500"><option value="">Tất cả loại</option>{uniqueCategories.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                   <input type="text" placeholder="Tìm tên/SKU..." value={filters.search} onChange={e => setFilters({...filters, search: e.target.value})} className="flex-1 h-10 px-2 text-sm bg-gray-50 border rounded-lg outline-none focus:ring-2 focus:ring-orange-500" />
                                </div>
                                {(filters.startDate || filters.endDate || filters.category || filters.search) && (
                                    <button onClick={() => setFilters({startDate:'', endDate:'', category:'', search:''})} className="w-full py-1 text-xs text-red-500 font-bold uppercase tracking-wider">Xóa bộ lọc</button>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="px-4 mb-2">
                        <div className="bg-gradient-to-r from-orange-500 to-orange-600 rounded-2xl p-4 text-white shadow-md flex justify-between items-center">
                             <div><p className="text-orange-100 text-xs font-bold uppercase tracking-wider mb-0.5">Tổng tiền đã chi</p><p className="text-2xl font-black">{formatCurrency(totalSpent)}</p></div>
                             <div className="text-right"><p className="text-orange-100 text-xs">{filteredInventory.length} phiếu nhập</p></div>
                        </div>
                    </div>

                    <div className="p-4 pt-0 space-y-3">
                        {filteredInventory.length === 0 && <p className="text-center text-gray-400 mt-5">Không có kết quả nào.</p>}
                        {filteredInventory.map(inv => {
                            const master = masterItems.find(m => m.id === inv.masterId);
                            if (!master) return null;
                            const unitPrice = inv.price / inv.quantity;
                            const dateString = new Date(inv.date).toLocaleDateString('vi-VN');
                            
                            return (
                                <div key={inv.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                     <div className="flex-1 pr-2">
                                         <div className="flex items-center gap-2 mb-1"><h3 className="font-bold text-gray-800">{master.name}</h3><span className="bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded flex items-center gap-1"><CalendarDays size={10}/> {dateString}</span></div>
                                         {inv.store && <p className="text-[11px] text-blue-600 font-medium mb-1.5 flex items-center gap-1 px-1.5 py-0.5 bg-blue-50 w-fit rounded">{inv.store}</p>}
                                         <div className="flex items-center space-x-2">
                                             <span className="text-sm font-semibold text-gray-600">{inv.inputQty !== undefined ? inv.inputQty : inv.quantity} {inv.inputUnit || master.unit}</span>
                                             <span className="w-1 h-1 rounded-full bg-gray-300"></span>
                                             <span className="text-sm font-bold text-orange-600">{formatCurrency(inv.price)}</span>
                                         </div>
                                         <p className="text-[11px] text-gray-400 mt-0.5 tracking-wide">≈ {formatCurrency(unitPrice)} / {master.unit} (Chuẩn gốc)</p>
                                     </div>
                                     <div className="flex flex-col space-y-1">
                                         <button onClick={() => handleEdit(inv)} className="w-8 h-8 flex items-center justify-center rounded-full text-blue-400 bg-blue-50 active:scale-90"><Edit2 size={14} /></button>
                                         <button onClick={() => onDelete(inv.id)} className="w-8 h-8 flex items-center justify-center rounded-full text-red-400 bg-red-50 active:scale-90"><Trash2 size={14} /></button>
                                     </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ==========================================
        // VIEW 3: PLANNER & RECIPES 
        // ==========================================
        function PlannerView({ recipes, inventory, masterItems, onSaveRecipe, onDeleteRecipe, planItems, setPlanItems }) {
            const [subTab, setSubTab] = useState('plan'); // 'plan', 'recipes', 'edit_recipe'
            const [currentRecipe, setCurrentRecipe] = useState(null);

            const getLatestUnitCost = (masterId) => {
                const invs = inventory.filter(i => i.masterId === masterId).sort((a,b) => b.date - a.date);
                if (invs.length === 0) return null; 
                return invs[0].price / invs[0].quantity; 
            };

            const calculateRecipeTotalCost = (items) => {
                if (!items) return 0;
                return items.reduce((sum, item) => {
                    const unitCost = getLatestUnitCost(item.masterId);
                    if (unitCost === null) return sum;
                    return sum + (unitCost * item.used);
                }, 0);
            };

            const aggregatedIngredients = useMemo(() => {
                const totals = {};
                planItems.forEach(planItem => {
                    const recipe = recipes.find(r => r.id === planItem.recipeId);
                    if (!recipe) return;

                    recipe.items.forEach(ing => {
                        if (!totals[ing.masterId]) {
                            const master = masterItems.find(m => m.id === ing.masterId);
                            totals[ing.masterId] = {
                                masterId: ing.masterId,
                                name: master ? master.name : 'Không xác định',
                                unit: master ? master.unit : '',
                                totalQty: 0,
                                totalCost: 0,
                                isMissingPrice: false
                            };
                        }
                        
                        const qtyNeeded = ing.used * planItem.quantity;
                        totals[ing.masterId].totalQty += qtyNeeded;

                        const unitCost = getLatestUnitCost(ing.masterId);
                        if (unitCost !== null) {
                            totals[ing.masterId].totalCost += unitCost * qtyNeeded;
                        } else {
                            totals[ing.masterId].isMissingPrice = true;
                        }
                    });
                });
                
                return Object.values(totals).sort((a, b) => a.name.localeCompare(b.name));
            }, [planItems, recipes, masterItems, inventory]);

            const grandTotalCost = aggregatedIngredients.reduce((sum, item) => sum + item.totalCost, 0);

            if (subTab === 'plan' || subTab === 'recipes') {
                return (
                    <div className="flex flex-col h-full">
                        <div className="bg-white p-2 border-b border-gray-200 sticky top-0 z-10">
                            <div className="flex bg-gray-100 p-1 rounded-xl">
                                <button 
                                    onClick={() => setSubTab('plan')}
                                    className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${subTab === 'plan' ? 'bg-white shadow text-orange-600' : 'text-gray-500'}`}
                                >
                                    Lên Đơn
                                </button>
                                <button 
                                    onClick={() => setSubTab('recipes')}
                                    className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${subTab === 'recipes' ? 'bg-white shadow text-orange-600' : 'text-gray-500'}`}
                                >
                                    Công thức bánh
                                </button>
                            </div>
                        </div>

                        {subTab === 'plan' && (
                            <PlanManager 
                                recipes={recipes} 
                                planItems={planItems} 
                                setPlanItems={setPlanItems} 
                                aggregatedIngredients={aggregatedIngredients}
                                grandTotalCost={grandTotalCost}
                            />
                        )}

                        {subTab === 'recipes' && (
                            <div className="p-4 space-y-4">
                                <button 
                                    onClick={() => { setCurrentRecipe({ id: null, name: '', items: [] }); setSubTab('edit_recipe'); }}
                                    className="w-full h-14 bg-orange-100 text-orange-700 font-bold rounded-xl flex items-center justify-center space-x-2 active:scale-95 transition-all shadow-sm"
                                >
                                    <Plus size={22} /><span>Tạo công thức mới</span>
                                </button>

                                {recipes.length === 0 ? (
                                    <div className="text-center py-10 text-gray-400">
                                        <Calculator size={48} className="mx-auto mb-3 opacity-20" />
                                        <p>Bạn chưa tạo công thức bánh nào.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {recipes.map(recipe => {
                                            const totalCost = calculateRecipeTotalCost(recipe.items);
                                            return (
                                                <div key={recipe.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                                    <div className="bg-gray-900 p-4 flex justify-between items-center text-white">
                                                        <h3 className="font-bold text-lg">{recipe.name}</h3>
                                                        <div className="text-right">
                                                            <p className="text-[10px] text-gray-400 uppercase tracking-wide">Cost cho 1 mẻ/cái</p>
                                                            <p className="text-lg font-bold text-orange-400">{formatCurrency(totalCost)}</p>
                                                        </div>
                                                    </div>
                                                    <div className="p-3 bg-gray-50 flex justify-between items-center border-t border-gray-100">
                                                        <span className="text-sm text-gray-500 font-medium">{recipe.items?.length || 0} nguyên liệu</span>
                                                        <div className="flex space-x-2">
                                                            <button onClick={() => { setCurrentRecipe(recipe); setSubTab('edit_recipe'); }} className="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm font-bold text-gray-700 active:bg-gray-100">Sửa / Xem</button>
                                                            <button onClick={() => onDeleteRecipe(recipe.id)} className="px-3 py-1.5 bg-red-50 text-red-500 rounded-lg active:bg-red-100"><Trash2 size={16} /></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <RecipeEditor 
                    recipe={currentRecipe} 
                    masterItems={masterItems}
                    getLatestUnitCost={getLatestUnitCost}
                    onSave={(updatedRecipe) => { onSaveRecipe(updatedRecipe); setSubTab('recipes'); }}
                    onCancel={() => setSubTab('recipes')}
                />
            );
        }

        function PlanManager({ recipes, planItems, setPlanItems, aggregatedIngredients, grandTotalCost }) {
            const [selectedRecipeId, setSelectedRecipeId] = useState('');
            const [quantity, setQuantity] = useState('');

            const handleAddPlan = () => {
                if (!selectedRecipeId || !quantity) return;
                
                const existingIndex = planItems.findIndex(p => p.recipeId === selectedRecipeId);
                if (existingIndex >= 0) {
                    const newPlans = [...planItems];
                    newPlans[existingIndex].quantity += parseInt(quantity, 10);
                    setPlanItems(newPlans);
                } else {
                    setPlanItems([...planItems, { id: generateId(), recipeId: selectedRecipeId, quantity: parseInt(quantity, 10) }]);
                }
                
                setSelectedRecipeId('');
                setQuantity('');
            };

            const handleRemovePlan = (id) => {
                setPlanItems(planItems.filter(p => p.id !== id));
            };

            return (
                <div className="p-4 space-y-4">
                    
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                        <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Thêm bánh vào kế hoạch làm</label>
                        <select value={selectedRecipeId} onChange={(e) => setSelectedRecipeId(e.target.value)} className="w-full h-12 px-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 font-medium mb-3 appearance-none outline-none focus:ring-2 focus:ring-orange-500">
                            <option value="">-- Chọn công thức bánh --</option>
                            {recipes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                        </select>
                        
                        {selectedRecipeId && (
                            <div className="flex space-x-3">
                                <div className="flex-[2] relative flex items-center">
                                    <input type="number" placeholder="Số lượng làm..." value={quantity} onChange={e => setQuantity(e.target.value)} className="w-full h-12 pl-3 pr-12 bg-gray-50 border border-gray-200 rounded-xl text-lg font-bold outline-none focus:ring-2 focus:ring-orange-500" />
                                    <div className="absolute right-3 top-0 bottom-0 flex items-center text-gray-400 font-medium text-sm">Cái/Mẻ</div>
                                </div>
                                <button onClick={handleAddPlan} disabled={!quantity || parseInt(quantity, 10) <= 0} className="flex-1 h-12 bg-orange-500 text-white font-bold rounded-xl active:scale-95 disabled:bg-gray-300">Thêm</button>
                            </div>
                        )}
                    </div>

                    {planItems.length > 0 && (
                        <div className="space-y-2">
                            <div className="flex justify-between items-center mb-1">
                                <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider pl-1">Danh sách cần làm</h3>
                                <button onClick={() => setPlanItems([])} className="text-[10px] text-red-500 font-bold uppercase tracking-wide bg-red-50 px-2 py-1 rounded">Xóa hết</button>
                            </div>
                            {planItems.map(plan => {
                                const recipe = recipes.find(r => r.id === plan.recipeId);
                                if (!recipe) return null;
                                return (
                                    <div key={plan.id} className="bg-orange-50 border border-orange-100 p-2.5 rounded-xl flex items-center justify-between">
                                         <div className="flex items-center gap-2">
                                             <div className="bg-white w-8 h-8 rounded-lg flex items-center justify-center font-bold text-orange-600 shadow-sm">{plan.quantity}</div>
                                             <span className="font-bold text-gray-800 text-sm">{recipe.name}</span>
                                         </div>
                                         <button onClick={() => handleRemovePlan(plan.id)} className="text-red-400 p-1 active:scale-90"><X size={18}/></button>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {planItems.length > 0 && (
                        <div className="mt-6">
                            <div className="bg-gray-900 rounded-t-2xl p-4 text-white flex justify-between items-end shadow-lg">
                                 <div>
                                     <h3 className="text-sm font-bold flex items-center gap-2"><ShoppingBag size={18} className="text-orange-400"/> Tổng Nguyên Liệu</h3>
                                     <p className="text-[10px] text-gray-400 mt-0.5">Dựa trên {planItems.length} hạng mục</p>
                                 </div>
                                 <div className="text-right">
                                     <p className="text-[10px] text-gray-400 uppercase tracking-wide">Dự toán tổng Cost</p>
                                     <p className="text-2xl font-black text-orange-400">{formatCurrency(grandTotalCost)}</p>
                                 </div>
                            </div>

                            <div className="bg-white rounded-b-2xl border border-t-0 border-gray-200 shadow-sm divide-y divide-gray-100">
                                {aggregatedIngredients.map((item, idx) => (
                                    <div key={idx} className="p-3.5 flex items-center justify-between">
                                         <div>
                                             <p className="font-bold text-gray-800 leading-tight">{item.name}</p>
                                             {item.isMissingPrice && <p className="text-[10px] text-red-500 flex items-center gap-1 mt-0.5"><AlertCircle size={10}/> Chưa có dữ liệu giá nhập</p>}
                                         </div>
                                         <div className="text-right">
                                             <p className="text-lg font-black text-orange-600">{formatSmartQty(item.totalQty, item.unit)}</p>
                                             <p className="text-xs text-gray-400 font-medium">{formatCurrency(item.totalCost)}</p>
                                         </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {planItems.length === 0 && (
                        <div className="text-center py-12 text-gray-400">
                            <ClipboardList size={48} className="mx-auto mb-3 opacity-20" />
                            <p>Thêm bánh để tính toán nguyên liệu.</p>
                        </div>
                    )}
                </div>
            );
        }

        function RecipeEditor({ recipe, masterItems, getLatestUnitCost, onSave, onCancel }) {
            const [name, setName] = useState(recipe?.name || '');
            const [items, setItems] = useState(recipe?.items || []);
            const [errorMsg, setErrorMsg] = useState('');
            
            const [selectedMasterId, setSelectedMasterId] = useState('');
            const [useQty, setUseQty] = useState('');
            const [inputUnit, setInputUnit] = useState('');

            useEffect(() => {
                const m = masterItems.find(x => x.id === selectedMasterId);
                if (m) setInputUnit(m.unit);
            }, [selectedMasterId, masterItems]);

            const totalCost = items.reduce((sum, item) => {
                const unitCost = getLatestUnitCost(item.masterId);
                return sum + (unitCost !== null ? unitCost * item.used : 0);
            }, 0);

            const handleAddItem = () => {
                if (!selectedMasterId || !useQty) return;
                const master = masterItems.find(m => m.id === selectedMasterId);
                const normalizedUsed = normalizeToMaster(useQty, inputUnit, master.unit);

                const existingIndex = items.findIndex(i => i.masterId === selectedMasterId);
                if (existingIndex >= 0) {
                    const newItems = [...items];
                    newItems[existingIndex].used += normalizedUsed;
                    newItems[existingIndex].inputQty = newItems[existingIndex].used; 
                    newItems[existingIndex].inputUnit = master.unit;
                    setItems(newItems);
                } else {
                    setItems([...items, { id: generateId(), masterId: selectedMasterId, used: normalizedUsed, inputQty: parseFloat(useQty), inputUnit: inputUnit }]);
                }
                setSelectedMasterId(''); setUseQty('');
            };

            const handleSave = () => {
                if (!name.trim()) { setErrorMsg("Vui lòng nhập tên công thức/sản phẩm!"); return; }
                setErrorMsg('');
                onSave({ id: recipe?.id, name, items });
            };

            const selectedMaster = masterItems.find(m => m.id === selectedMasterId);

            return (
                <div className="flex flex-col h-full bg-gray-50 absolute inset-0 z-40 overflow-y-auto">
                    <div className="bg-white border-b border-gray-200 p-4 sticky top-0 z-10 flex items-center justify-between shadow-sm">
                        <button onClick={onCancel} className="p-2 -ml-2 text-gray-500 active:bg-gray-100 rounded-full"><ChevronLeft size={24}/></button>
                        <h2 className="font-bold text-gray-800 text-lg flex-1 text-center truncate px-2">{name || 'Công thức mới'}</h2>
                        <button onClick={handleSave} className="flex items-center space-x-1 text-orange-600 font-bold bg-orange-50 px-3 py-1.5 rounded-lg active:bg-orange-100">
                            <Save size={16}/><span>Lưu</span>
                        </button>
                    </div>

                    <div className="p-4 space-y-4">
                        {errorMsg && (
                            <div className="p-3 bg-red-100 text-red-700 rounded-xl text-sm font-bold flex items-center gap-2">
                                <AlertCircle size={18}/> {errorMsg}
                            </div>
                        )}

                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Tên công thức / Sản phẩm</label>
                            <input type="text" placeholder="VD: Bánh Bông Lan Trứng Muối" value={name} onChange={e => {setName(e.target.value); setErrorMsg('');}} className="w-full h-12 px-3 bg-gray-50 border border-gray-200 rounded-xl font-bold text-lg focus:ring-2 focus:ring-orange-500 outline-none mb-4" />
                            
                            <div className="bg-orange-50 rounded-xl p-3 border border-orange-100 flex justify-between items-center">
                                <div>
                                    <p className="text-orange-800 text-[10px] font-bold uppercase tracking-wider mb-0.5">Dự toán Cost 1 đơn vị</p>
                                    <p className="text-2xl font-black text-orange-600">{formatCurrency(totalCost)}</p>
                                </div>
                                <Calculator size={24} className="text-orange-300 opacity-50" />
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Thêm thành phần</label>
                            <select value={selectedMasterId} onChange={(e) => setSelectedMasterId(e.target.value)} className="w-full h-12 px-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 font-medium mb-3 appearance-none outline-none focus:ring-2 focus:ring-orange-500">
                                <option value="">-- Chọn từ Danh mục nguyên liệu --</option>
                                {masterItems.map(m => <option key={m.id} value={m.id}>{m.name} (Gốc: {m.unit})</option>)}
                            </select>
                            
                            {selectedMaster && (
                                <div className="flex space-x-3">
                                    <div className="flex-[2] relative flex items-center">
                                        <input type="number" step="any" placeholder="Định lượng..." value={useQty} onChange={e => setUseQty(e.target.value)} className={`w-full h-12 pl-3 ${getCompatibleUnits(selectedMaster.unit).length > 1 ? 'pr-16' : 'pr-12'} bg-gray-50 border border-gray-200 rounded-xl text-lg font-bold outline-none focus:ring-2 focus:ring-orange-500`} />
                                        
                                        {getCompatibleUnits(selectedMaster.unit).length > 1 ? (
                                            <div className="absolute right-0 top-0 bottom-0 flex items-center bg-gray-100 border-l border-gray-200 rounded-r-xl">
                                                <select value={inputUnit} onChange={e => setInputUnit(e.target.value)} className="h-full bg-transparent text-gray-600 font-bold pl-2 pr-1 focus:outline-none text-sm cursor-pointer">
                                                    {getCompatibleUnits(selectedMaster.unit).map(u => <option key={u} value={u}>{u}</option>)}
                                                </select>
                                            </div>
                                        ) : (
                                            <div className="absolute right-3 top-0 bottom-0 flex items-center text-gray-400 font-medium">{selectedMaster.unit}</div>
                                        )}
                                    </div>
                                    <button onClick={handleAddItem} disabled={!useQty} className="flex-1 h-12 bg-gray-900 text-white font-bold rounded-xl active:scale-95 disabled:bg-gray-300">Thêm</button>
                                </div>
                            )}
                        </div>

                        <div>
                            <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 pl-1">Thành phần chi tiết ({items.length})</h3>
                            <div className="space-y-2">
                                {items.length === 0 && <p className="text-center text-gray-400 py-4 bg-white rounded-xl border border-dashed border-gray-200">Chưa có thành phần nào.</p>}
                                
                                {items.map(item => {
                                    const master = masterItems.find(m => m.id === item.masterId);
                                    if (!master) return null;
                                    
                                    const unitCost = getLatestUnitCost(master.id);
                                    const isMissingData = unitCost === null;
                                    const cost = isMissingData ? 0 : unitCost * item.used;

                                    return (
                                        <div key={item.id} className={`bg-white p-3 rounded-xl flex items-center justify-between shadow-sm border ${isMissingData ? 'border-red-200' : 'border-gray-100'}`}>
                                            <div className="flex-1 pr-2">
                                                <h4 className="font-bold text-gray-800 leading-tight">{master.name}</h4>
                                                <p className="text-sm text-gray-500 mt-0.5">Dùng: <span className="font-semibold text-gray-700">{item.inputQty !== undefined ? item.inputQty : item.used} {item.inputUnit || master.unit}</span></p>
                                                {isMissingData && (
                                                   <p className="text-[10px] text-red-500 flex items-center gap-1 mt-1 font-medium"><AlertCircle size={10}/> Chưa có giá nhập kho</p>
                                                )}
                                            </div>
                                            <div className="text-right flex flex-col items-end">
                                                <div className={`font-bold text-lg ${isMissingData ? 'text-gray-300' : 'text-gray-900'}`}>{formatCurrency(cost)}</div>
                                                <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="text-[10px] text-red-400 mt-1 uppercase font-bold active:opacity-50 px-2 py-1 bg-red-50 rounded">Xóa</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="h-20"></div>
                    </div>
                </div>
            );
        }

        // --- RENDER APP ĐẾN ROOT DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
